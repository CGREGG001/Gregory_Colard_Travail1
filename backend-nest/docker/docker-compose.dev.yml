services:
  #API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    container_name: bida_nest-api
    env_file:
      - ../.env.dev
    ports:
      - "${API_PORT}:3000"
    volumes:
      - ..:/app
      - /app/node_modules
    depends_on:
      - db

  #DATABASES
  db:
    image: postgres:15-alpine
    container_name: bida_nest-db
    env_file:
      - ../.env.dev
    environment:
        POSTGRES_PASSWORD: ${DB_PASSWORD}
        POSTGRES_USER: ${DB_USER}
        POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - bida_nest_data:/var/lib/postgresql/data:z

volumes:
  bida_nest_data: